# Technique catalog — HAJ-204 skeleton fixture, revised under HAJ-213.
#
# This file is a small hand-authored sample (5 techniques) used to exercise
# the schema and loader. The full 40–60-technique catalog authored from
# Kodokan Judo (Kano) and Judo Unleashed (Ohlenkamp) is HAJ-205. Entries
# here are minimally plausible but should not be treated as competition-
# accurate authoring — they exist to validate the loader path. Difficulty
# values here are first-pass; recalibrate during HAJ-205 authoring.
#
# Schema reference: design-notes/triage/technique-vocabulary-system.md v1.2
# (Section 2). Loader: src/technique_catalog.py.
#
# v1.2 schema notes for migration:
#   - canonical_grip_signatures is a LIST. Most entries have a single
#     signature; multi-signature lists are for distinct grip variants of
#     the same technique. Each signature has `mirror_eligible: true` by
#     default — engine auto-mirrors for opposite-stance judoka, so authors
#     record only the canonical (right-stance) configuration.
#   - admissible_kuzushi_vectors gates Stage 2 selection. Accepts the
#     literal string `any` as a wildcard for omnidirectional techniques.
#   - primary_kuzushi_vectors is optional (defaults to admissible). Used
#     for scoring quality and prose surfaces — the "primary scoring"
#     subset of admissible directions.

techniques:
  - technique_id: deashi_harai
    name_japanese: Deashi-harai
    name_english: Forward Foot Sweep
    family: ashi_waza
    subfamily: forward_throw
    kodokan_status: gokyo_no_waza
    canonical_grip_signatures:
      - tori_required_grips:
          - hand: tori_left
            target_region: uke_sleeve_upper
            minimum_depth: shallow
          - hand: tori_right
            target_region: uke_lapel_high
            minimum_depth: controlled
        uke_disqualifying_grips: []
    # Foot sweep — sweeps fire whichever way uke steps.
    admissible_kuzushi_vectors: any
    # Forward sweeps score cleanest (the canonical "forward foot sweep").
    primary_kuzushi_vectors:
      - forward_right_diagonal
      - forward_left_diagonal
    couple_type: forward_rotation_about_ankle_axis
    posture_requirements: upright_or_forward_compromised
    base_difficulty: 65
    pedagogical_prerequisites: []
    minimum_belt_for_competition_use: yellow
    era_introduced: 1895

  - technique_id: uchi_mata
    name_japanese: Uchi-mata
    name_english: Inner Thigh Throw
    family: koshi_waza
    subfamily: forward_throw
    kodokan_status: gokyo_no_waza
    canonical_grip_signatures:
      - tori_required_grips:
          - hand: tori_left
            target_region: uke_sleeve_upper
            minimum_depth: controlled
          - hand: tori_right
            target_region: uke_lapel_high
            minimum_depth: controlled
        uke_disqualifying_grips:
          - hand: tori_right
            target_region: uke_sleeve_lower
            minimum_depth: deep
    admissible_kuzushi_vectors:
      - forward_right_diagonal
      - forward_pure
    couple_type: forward_rotation_about_hip_axis
    posture_requirements: upright_or_forward_compromised
    base_difficulty: 70
    pedagogical_prerequisites:
      - harai_goshi
    minimum_belt_for_competition_use: green
    failed_throw_consequence: uke_lands_stomach
    ne_waza_followup_preferences:
      - kesa_gatame
    era_introduced: 1895

  - technique_id: osoto_gari
    name_japanese: Osoto-gari
    name_english: Large Outer Reap
    family: ashi_waza
    subfamily: rear_throw
    kodokan_status: gokyo_no_waza
    canonical_grip_signatures:
      - tori_required_grips:
          - hand: tori_left
            target_region: uke_sleeve_upper
            minimum_depth: shallow
          - hand: tori_right
            target_region: uke_lapel_high
            minimum_depth: controlled
        uke_disqualifying_grips: []
    admissible_kuzushi_vectors:
      - rear_right_diagonal
      - direct_rear
    couple_type: reverse_rotation_about_shoulder_axis
    posture_requirements: extended_backward
    base_difficulty: 40
    minimum_belt_for_competition_use: yellow
    failed_throw_consequence: tori_falls_to_back
    era_introduced: 1895

  - technique_id: seoi_nage
    name_japanese: Seoi-nage
    name_english: Shoulder Throw
    family: te_waza
    subfamily: forward_throw
    kodokan_status: gokyo_no_waza
    canonical_grip_signatures:
      - tori_required_grips:
          - hand: tori_left
            target_region: uke_sleeve_upper
            minimum_depth: deep
          - hand: tori_right
            target_region: uke_lapel_high
            minimum_depth: controlled
        uke_disqualifying_grips: []
    admissible_kuzushi_vectors:
      - forward_pure
    couple_type: forward_rotation_about_shoulder_axis
    posture_requirements: bent_forward
    base_difficulty: 60
    pedagogical_prerequisites: []
    minimum_belt_for_competition_use: yellow
    failed_throw_consequence: tori_to_knees
