<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;color:var(--fg);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:flex;flex-direction:column;gap:10px;}
  .mono-row{font-family:var(--font-mono);font-size:13px;color:var(--fg);}
  .time{color:#d4a04a;font-size:11px;margin-right:10px;}
  .broad{font-family:var(--font-sans);font-weight:300;font-size:22px;color:#d4a04a;letter-spacing:0.14em;text-transform:uppercase;border-bottom:1px solid rgba(212,160,74,0.3);padding-bottom:6px;}
  .lab{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:4px;}
</style></head><body><div class="card">
  <div>
    <div class="lab">Broadcast · sans light uppercase</div>
    <div class="broad">Round 1 · –73kg · Tanaka vs. Sato</div>
  </div>
  <div>
    <div class="lab">Mono · IBM Plex — timecodes &amp; readouts</div>
    <div class="mono-row"><span class="time">0:14</span>grip depth 0.8 · composure 7/10 · R.hand → DEEP COLLAR</div>
    <div class="mono-row"><span class="time">0:18</span>seoi-nage attempt · stuffed · ne-waza window 11%</div>
  </div>
</div></body></html>
