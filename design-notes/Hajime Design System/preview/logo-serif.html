<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:flex;gap:20px;align-items:center;}
  .logo{
    width:240px;height:110px;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,150,90,0.10), transparent 60%),
      repeating-linear-gradient(92deg, rgba(80,50,10,0.025) 0 1px, transparent 1px 3px),
      #f2e9cf;
    border:1px solid #d8cdb0;border-radius:3px;flex-shrink:0;
    box-shadow: 2px 3px 0 rgba(60,45,20,0.06);
  }
  .logo img{max-width:92%;max-height:92%;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-paper-mute);line-height:1.7;letter-spacing:0.02em;}
  .meta b{color:#1a1410;font-weight:400;}
</style></head><body><div class="card">
  <div class="logo"><img src="../assets/logo/hajime-wordmark-serif.svg" alt="Hajime serif"></div>
  <div class="meta">
    <div><b>primary · paper</b></div>
    <div>hajime-wordmark-serif.svg</div>
    <div>kanji 始 dominant · hanko stamp</div>
    <div>document + title surfaces</div>
  </div>
</div></body></html>
