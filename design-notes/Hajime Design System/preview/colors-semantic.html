<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;color:var(--fg);font-family:var(--font-serif);}
  .card{padding:22px 24px;min-height:110px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:center;}
  .item{display:flex;align-items:center;gap:10px;}
  .chip{width:28px;height:28px;border-radius:3px;border:1px solid rgba(212,160,74,0.25);flex-shrink:0;}
  .lab{line-height:1.2;}
  .lab .t{font-size:12px;color:var(--fg);}
  .lab .s{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head><body><div class="card">
  <div class="item"><div class="chip" style="background:#d4a04a;"></div><div class="lab"><div class="t">Focus / accent</div><div class="s">amber-bulb</div></div></div>
  <div class="item"><div class="chip" style="background:#7b2418;"></div><div class="lab"><div class="t">Danger / ippon</div><div class="s">oxblood</div></div></div>
  <div class="item"><div class="chip" style="background:#4a5838;"></div><div class="lab"><div class="t">Training surface</div><div class="s">mat-green</div></div></div>
  <div class="item"><div class="chip" style="background:#6b4a2e;"></div><div class="lab"><div class="t">Frame / case</div><div class="s">trophy-wood</div></div></div>
  <div class="item"><div class="chip" style="background:#f5edd8;"></div><div class="lab"><div class="t">Body on ink</div><div class="s">gi-cream</div></div></div>
  <div class="item"><div class="chip" style="background:rgba(245,237,216,0.65);"></div><div class="lab"><div class="t">Muted text</div><div class="s">fg-muted .65</div></div></div>
  <div class="item"><div class="chip" style="background:rgba(212,160,74,0.3);"></div><div class="lab"><div class="t">Hairline border</div><div class="s">amber .30</div></div></div>
  <div class="item"><div class="chip" style="background:rgba(245,237,216,0.06);border-color:rgba(212,160,74,0.35);"></div><div class="lab"><div class="t">Card on ink</div><div class="s">cream .06</div></div></div>
</div></body></html>
