<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .chip{width:120px;height:60px;background:#faf4e2;border:1px solid #d8cdb0;border-radius:3px;}
  .chip.ink{background:#221c16;border-color:rgba(212,160,74,0.35);}
  .chip.amber{background:#1a1410;border:1px solid rgba(212,160,74,0.4);}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-paper-mute);letter-spacing:0.04em;text-align:center;line-height:1.3;}
</style></head><body><div class="card">
  <div class="cell">
    <div class="chip" style="box-shadow:2px 3px 0 rgba(60,45,20,0.06);"></div>
    <div class="lab">print-offset<br>letterpress feel</div>
  </div>
  <div class="cell">
    <div class="chip ink" style="box-shadow:0 2px 12px rgba(0,0,0,0.35);"></div>
    <div class="lab">ink · subtle lift<br>on dark surfaces</div>
  </div>
  <div class="cell">
    <div class="chip amber" style="box-shadow:0 0 24px rgba(212,160,74,0.28);"></div>
    <div class="lab">bulb glow · rare<br>focus accent only</div>
  </div>
</div></body></html>
