<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px dotted var(--border-dotted);padding-bottom:8px;}
  .row:last-child{border-bottom:0;padding-bottom:0;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-paper-mute);width:80px;flex-shrink:0;letter-spacing:0.05em;}
  .spec{flex:1;}
</style></head><body><div class="card">
  <div class="row"><div class="tag">h1 · 34</div><div class="spec" style="font-size:34px;line-height:1.15;letter-spacing:-0.005em;">The chair beside the mat</div></div>
  <div class="row"><div class="tag">h2 · 24</div><div class="spec" style="font-size:24px;line-height:1.4;">Round 1 — quarterfinal</div></div>
  <div class="row"><div class="tag">h3 · 20</div><div class="spec" style="font-size:20px;line-height:1.4;">Coach's chair · Tanaka</div></div>
  <div class="row"><div class="tag">body · 15</div><div class="spec" style="font-size:15px;line-height:1.6;">Tanaka steps in. Right hand reaches for the lapel.</div></div>
  <div class="row"><div class="tag">italic · 17</div><div class="spec" style="font-size:17px;line-height:1.4;font-style:italic;color:var(--fg-paper-soft);">His entry window is closing.</div></div>
</div></body></html>
