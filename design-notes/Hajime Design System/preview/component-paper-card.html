<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;}
  .lab{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-paper-mute);margin-bottom:10px;}
  .demo{background:#faf4e2;border:1px solid #d8cdb0;border-radius:3px;box-shadow:2px 3px 0 rgba(60,45,20,0.06);padding:14px 16px;}
  .demo .h{font-size:18px;margin:0 0 4px;}
  .demo .b{font-size:13px;color:var(--fg-paper-soft);line-height:1.5;margin:0;}
  .num{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;border:1px solid var(--fg-paper-soft);border-radius:50%;font-size:12px;margin-right:8px;color:var(--fg-paper-soft);vertical-align:middle;}
</style></head><body><div class="card">
  <div class="lab">Paper card · print-offset shadow · 3px radius</div>
  <div class="demo">
    <p class="h"><span class="num">02</span>The source dojo</p>
    <p class="b">Cranford JKC sits below street level at 107 South Avenue West. <em>Bsmt 1</em> in the mailing address. A literal basement sanctuary.</p>
  </div>
</div></body></html>
