<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;color:var(--fg);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:flex;gap:14px;align-items:stretch;}
  .tile{flex:1;height:90px;border-radius:3px;display:flex;align-items:flex-end;padding:10px 12px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.05em;color:rgba(245,237,216,0.8);}
  .paper{background:#efe6d0;color:rgba(20,20,16,0.7);}
  .ink{background:#1a1410;border:1px solid rgba(212,160,74,0.3);}
  .mat{background:#4a5838;color:#f5edd8;}
  .bulb{background:radial-gradient(ellipse at top left, rgba(212,160,74,0.18), transparent 60%), #1a1410;border:1px solid rgba(212,160,74,0.3);}
</style></head><body><div class="card">
  <div class="tile paper">paper · document</div>
  <div class="tile ink">ink · sanctuary</div>
  <div class="tile mat">mat · training</div>
  <div class="tile bulb">bulb · title</div>
</div></body></html>
