<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:20px 24px;min-height:110px;display:flex;flex-direction:column;justify-content:center;gap:12px;}
  .row{display:flex;gap:10px;align-items:stretch;}
  .sw{flex:1;min-height:72px;border-radius:3px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(0,0,0,0.08);}
  .sw .n{font-family:var(--font-serif);font-size:11px;letter-spacing:0;line-height:1.1;}
  .sw .h{font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;margin-top:2px;opacity:0.85;}
  .on-dark .n,.on-dark .h{color:rgba(245,237,216,0.92);}
  .on-light .n,.on-light .h{color:rgba(20,20,16,0.85);}
</style></head><body><div class="card">
  <div class="row">
    <div class="sw on-dark" style="background:#1a1410;"><div class="n">Ink black</div><div class="h">#1A1410</div></div>
    <div class="sw on-dark" style="background:#4a5838;"><div class="n">Mat green</div><div class="h">#4A5838</div></div>
    <div class="sw on-dark" style="background:#6b4a2e;"><div class="n">Trophy wood</div><div class="h">#6B4A2E</div></div>
    <div class="sw on-dark" style="background:#7b2418;"><div class="n">Oxblood</div><div class="h">#7B2418</div></div>
    <div class="sw on-light" style="background:#d4a04a;"><div class="n">Amber bulb</div><div class="h">#D4A04A</div></div>
    <div class="sw on-light" style="background:#f5edd8;"><div class="n">Gi cream</div><div class="h">#F5EDD8</div></div>
  </div>
</div></body></html>
