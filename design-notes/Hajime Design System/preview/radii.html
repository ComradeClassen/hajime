<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .cell{text-align:center;}
  .box{width:72px;height:48px;background:#4a5838;margin:0 auto 8px;border:1px solid rgba(0,0,0,0.08);}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-paper-mute);letter-spacing:0.04em;}
  .name{font-size:12px;margin-bottom:2px;}
</style></head><body><div class="card">
  <div class="cell"><div class="box" style="border-radius:0;"></div><div class="name">r-0</div><div class="lab">0px · sharp</div></div>
  <div class="cell"><div class="box" style="border-radius:2px;"></div><div class="name">r-1</div><div class="lab">2px · chip</div></div>
  <div class="cell"><div class="box" style="border-radius:3px;"></div><div class="name">r-2</div><div class="lab">3px · card</div></div>
  <div class="cell"><div class="box" style="border-radius:4px;"></div><div class="name">r-3</div><div class="lab">4px · section</div></div>
</div></body></html>
