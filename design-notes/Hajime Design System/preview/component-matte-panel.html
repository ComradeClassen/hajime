<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;color:var(--fg);font-family:var(--font-serif);}
  .card{padding:22px 24px;}
  .panel{background:rgba(245,237,216,0.06);border:1px solid rgba(212,160,74,0.35);border-radius:3px;padding:14px 16px;}
  .title{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#d4a04a;margin:0 0 10px;}
  .line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dotted rgba(212,160,74,0.22);}
  .line:last-child{border-bottom:0;}
  .val{color:#d4a04a;font-family:var(--font-mono);font-size:12px;}
</style></head><body><div class="card"><div class="panel">
  <p class="title">— Coach's chair · Tanaka —</p>
  <div class="line"><span>Composure</span><span class="val">7 / 10 ↓</span></div>
  <div class="line"><span>Right grip</span><span class="val">5 / 10 ↓↓</span></div>
  <div class="line"><span>Left grip</span><span class="val">8 / 10</span></div>
  <div class="line"><span>Read speed</span><span class="val">6 / 10</span></div>
  <div class="line"><span>Trust in coach</span><span class="val">9 / 10</span></div>
</div></div></body></html>
