<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:#1a1410;font-family:var(--font-serif);}
  .card{padding:20px 24px;display:flex;gap:20px;align-items:center;}
  .fig{
    width:140px;height:170px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(180,150,90,0.10), transparent 60%),
      repeating-linear-gradient(92deg, rgba(80,50,10,0.025) 0 1px, transparent 1px 3px),
      #f2e9cf;
    border:1px solid #d8cdb0;border-radius:3px;
    box-shadow: 2px 3px 0 rgba(60,45,20,0.06);
  }
  .fig img{max-width:80%;max-height:92%;}
  .meta{font-family:var(--font-mono);font-size:11px;color:rgba(26,20,16,0.6);line-height:1.7;letter-spacing:0.02em;}
  .meta b{color:#1a1410;font-weight:400;}
  .flag{display:inline-block;margin-top:4px;padding:2px 6px;border:1px solid #7b2418;color:#7b2418;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;border-radius:2px;}
</style></head><body><div class="card">
  <div class="fig"><img src="../assets/illustrations/judoka-silhouette.svg" alt="judoka"></div>
  <div class="meta">
    <div><b>judoka · paper-doll</b></div>
    <div>judoka-silhouette.svg</div>
    <div>hand-drawn on washi · oxblood obi</div>
    <div>layered over photo backgrounds in match view</div>
    <div><span class="flag">placeholder</span> final = Ring 5, needs illustrator</div>
  </div>
</div></body></html>
