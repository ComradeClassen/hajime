<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);font-family:var(--font-serif);color:#1a1410;}
  .card{padding:22px 24px;display:flex;gap:20px;align-items:center;}
  .mark{
    width:130px;height:130px;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(180,150,90,0.10), transparent 60%),
      repeating-linear-gradient(92deg, rgba(80,50,10,0.025) 0 1px, transparent 1px 3px),
      #f2e9cf;
    border:1px solid #d8cdb0;border-radius:3px;flex-shrink:0;
    box-shadow: 2px 3px 0 rgba(60,45,20,0.06);
  }
  .mark img{width:88%;height:88%;}
  .meta{font-family:var(--font-mono);font-size:11px;color:rgba(26,20,16,0.55);line-height:1.7;letter-spacing:0.02em;}
  .meta b{color:#1a1410;font-weight:400;}
</style></head><body><div class="card">
  <div class="mark"><img src="../assets/mark/hajime-kanji.svg" alt="始"></div>
  <div class="meta">
    <div><b>standalone mark</b></div>
    <div>始 — "begin"</div>
    <div>hajime-kanji.svg · sumi ink on washi</div>
    <div>favicon · stamp · end-card signature</div>
  </div>
</div></body></html>
