<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .v{background:#1a1410;color:#f5edd8;border:1px solid rgba(212,160,74,0.3);border-radius:2px;padding:6px 10px;font-family:var(--font-mono);font-size:14px;min-width:60px;text-align:center;letter-spacing:0.05em;}
  .v.a{color:#d4a04a;}
  .v.r{color:#c95a4b;}
  .lab{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-paper-mute);margin-bottom:10px;}
  p{font-size:13px;color:var(--fg-paper-soft);margin:14px 0 0;line-height:1.5;}
</style></head><body><div class="card">
  <div class="lab">Typographic marks · no icon font</div>
  <div class="row">
    <div class="v">→</div><div class="v">←</div><div class="v">↑</div>
    <div class="v">↓</div><div class="v">↓↓</div>
    <div class="v a">✓</div><div class="v r">⚠</div>
    <div class="v">·</div><div class="v">—</div>
  </div>
  <p>Unicode marks carry ~90% of in-product signaling. Lucide (CDN) fills the rest at 1.5 stroke weight. Flagged placeholder.</p>
</div></body></html>
