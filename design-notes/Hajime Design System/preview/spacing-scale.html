<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .box{background:#4a5838;}
  .swatch{height:28px;border:1px solid rgba(0,0,0,0.08);border-radius:2px;}
  .w4{width:16px;} .w8{width:32px;} .w12{width:48px;} .w16{width:64px;} .w24{width:96px;} .w32{width:128px;}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--fg-paper-mute);width:80px;letter-spacing:0.04em;}
  .title{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-paper-mute);margin-bottom:14px;}
</style></head><body><div class="card">
  <div class="title">Spacing · 4px base</div>
  <div class="row"><div class="lab">s-1 · 4</div><div class="swatch box w4"></div></div>
  <div class="row"><div class="lab">s-2 · 8</div><div class="swatch box w8"></div></div>
  <div class="row"><div class="lab">s-4 · 16</div><div class="swatch box w16"></div></div>
  <div class="row"><div class="lab">s-6 · 24</div><div class="swatch box w24"></div></div>
  <div class="row"><div class="lab">s-8 · 32</div><div class="swatch box w32"></div></div>
</div></body></html>
