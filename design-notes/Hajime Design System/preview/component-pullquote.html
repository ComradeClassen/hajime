<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:22px 24px;display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:center;}
  .q{font-style:italic;font-size:16px;line-height:1.5;border-left:2px solid #1a1410;padding:4px 0 4px 14px;color:var(--fg-paper-soft);max-width:46ch;margin:0;}
  .notes{font-family:var(--font-mono);font-size:10px;color:var(--fg-paper-mute);line-height:1.6;letter-spacing:0.02em;}
  .notes span{color:var(--fg-paper);}
</style></head><body><div class="card">
  <p class="q">You walk down. The street noise drops. The air gets warmer. Old trophies catch the amber light on the far wall.</p>
  <div class="notes">
    <div><span>size</span> 17 / 1.4</div>
    <div><span>weight</span> regular italic</div>
    <div><span>border</span> 2px ink L</div>
    <div><span>measure</span> 46ch max</div>
    <div><span>opacity</span> 0.85</div>
  </div>
</div></body></html>
