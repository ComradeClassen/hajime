<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-paper);color:var(--fg-paper);font-family:var(--font-serif);}
  .card{padding:20px 24px;min-height:110px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;min-height:72px;border-radius:3px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid rgba(0,0,0,0.08);}
  .sw .n{font-size:11px;line-height:1.1;}
  .sw .h{font-family:var(--font-mono);font-size:10px;margin-top:2px;opacity:0.85;}
  .on-dark .n,.on-dark .h{color:rgba(245,237,216,0.92);}
  .on-light .n,.on-light .h{color:rgba(20,20,16,0.85);}
  .cap{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-paper-mute);margin-bottom:8px;}
</style></head><body><div class="card">
  <div class="cap">Neutrals — paper & ink</div>
  <div class="row">
    <div class="sw on-light" style="background:#efe6d0;"><div class="n">Paper</div><div class="h">#EFE6D0</div></div>
    <div class="sw on-light" style="background:#faf4e2;"><div class="n">Paper card</div><div class="h">#FAF4E2</div></div>
    <div class="sw on-light" style="background:#d8cdb0;"><div class="n">Paper dark</div><div class="h">#D8CDB0</div></div>
    <div class="sw on-dark" style="background:#2b241c;"><div class="n">Ink soft</div><div class="h">#2B241C</div></div>
    <div class="sw on-dark" style="background:#8a7a5c;"><div class="n">Ink light</div><div class="h">#8A7A5C</div></div>
    <div class="sw on-dark" style="background:#221c16;"><div class="n">Bg elev 1</div><div class="h">#221C16</div></div>
  </div>
</div></body></html>
