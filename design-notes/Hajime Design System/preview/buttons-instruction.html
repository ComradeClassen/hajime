<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;font-family:var(--font-serif);}
  .card{padding:22px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .btn{display:inline-block;padding:8px 14px;font-family:var(--font-serif);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;border-radius:2px;cursor:pointer;}
  .btn.primary{border:1px solid #d4a04a;color:#d4a04a;background:transparent;}
  .btn.primary:hover{color:#e8ba66;border-color:#e8ba66;}
  .btn.active{background:#7b2418;border:1px solid #7b2418;color:#f5edd8;}
  .btn.ghost{border:1px solid rgba(245,237,216,0.3);color:rgba(245,237,216,0.8);background:transparent;}
  .btn.danger{border:1px solid #7b2418;color:#c95a4b;background:transparent;}
</style></head><body><div class="card">
  <span class="btn primary">Break his grip</span>
  <span class="btn active">Stay patient</span>
  <span class="btn ghost">Switch stance</span>
  <span class="btn danger">Withdraw</span>
</div></body></html>
