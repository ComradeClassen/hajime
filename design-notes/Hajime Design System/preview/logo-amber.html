<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1a1410;color:#f5edd8;font-family:var(--font-serif);}
  .card{padding:22px 24px;display:flex;gap:20px;align-items:center;}
  .logo{
    width:280px;height:130px;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,160,74,0.10), transparent 60%),
      #1a1410;
    border:1px solid rgba(212,160,74,0.25);border-radius:3px;flex-shrink:0;
  }
  .logo img{max-width:94%;max-height:94%;}
  .meta{font-family:var(--font-mono);font-size:11px;color:rgba(245,237,216,0.6);line-height:1.7;letter-spacing:0.02em;}
  .meta b{color:#d4a04a;font-weight:400;}
</style></head><body><div class="card">
  <div class="logo"><img src="../assets/logo/hajime-wordmark-amber.svg" alt="Hajime on ink"></div>
  <div class="meta">
    <div><b>on-ink · dark surfaces</b></div>
    <div>hajime-wordmark-amber.svg</div>
    <div>black-belt knot · red rank tab</div>
    <div>title screens + dark chrome</div>
  </div>
</div></body></html>
